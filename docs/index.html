<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Лэндинг</title>
  <style>
    :root {
      --bg: #080d10;
      --panel: #10181d;
      --panel-2: #151f25;
      --text: #f5f7f8;
      --muted: #b8c3c8;
      --green: #21e88a;
      --green-dark: #10a66a;
      --lime: #c7ff3f;
      --yellow: #ffd33d;
      --violet: #7b4dff;
      --cyan: #35d7ff;
      --shadow: 0 30px 80px rgba(0, 0, 0, .42);
      --radius-xl: 42px;
      --radius-md: 24px;
      --font: "SB Sans Text", "SB Sans Display", Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(circle at 8% 12%, rgba(33, 232, 138, .28), transparent 28rem),
        radial-gradient(circle at 92% 18%, rgba(123, 77, 255, .28), transparent 24rem),
        radial-gradient(circle at 75% 88%, rgba(255, 211, 61, .15), transparent 25rem),
        linear-gradient(135deg, #071014 0%, #0a0f14 45%, #10171d 100%);
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      isolation: isolate;
    }

    .page::before,
    .page::after {
      content: "";
      position: fixed;
      inset: auto;
      z-index: -3;
      pointer-events: none;
    }

    .page::before {
      width: 520px;
      height: 520px;
      left: -180px;
      bottom: -210px;
      border-radius: 50%;
      background: rgba(33, 232, 138, .12);
      filter: blur(4px);
    }

    .page::after {
      width: 380px;
      height: 380px;
      right: -120px;
      top: -90px;
      border-radius: 50%;
      border: 70px solid rgba(255, 211, 61, .12);
      transform: rotate(22deg);
    }

    .shell {
      width: min(1180px, 100%);
      min-height: min(760px, calc(100vh - 56px));
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(360px, 520px);
      gap: clamp(24px, 4vw, 60px);
      align-items: center;
      padding: clamp(26px, 5vw, 64px);
      border: 1px solid rgba(255, 255, 255, .10);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(120deg, rgba(255, 255, 255, .08), rgba(255, 255, 255, .025)),
        rgba(8, 13, 16, .70);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
      overflow: hidden;
    }

    .shell::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: calc(var(--radius-xl) - 14px);
      border: 1px solid rgba(255, 255, 255, .055);
      pointer-events: none;
    }

    .grid-noise {
      position: absolute;
      inset: 0;
      z-index: -1;
      opacity: .22;
      background-image:
        linear-gradient(rgba(255, 255, 255, .07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .07) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle at 64% 42%, #000 0, transparent 64%);
    }

    .brand-mark {
      position: absolute;
      top: clamp(22px, 4vw, 42px);
      left: clamp(26px, 5vw, 64px);
      display: inline-flex;
      align-items: center;
      line-height: 0;
      color: var(--text);
    }

    .brand-logo {
      display: block;
      width: clamp(96px, 11vw, 132px);
      height: auto;
      filter: drop-shadow(0 18px 34px rgba(0, 0, 0, .42));
    }

    .content {
      padding-top: clamp(76px, 10vw, 110px);
      position: relative;
      z-index: 2;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: .02em;
    }

    .eyebrow::before {
      content: "";
      width: 42px;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--green), var(--cyan));
    }

    h1 {
      max-width: 760px;
      margin: 0;
      font-size: clamp(46px, 9vw, 108px);
      line-height: .88;
      letter-spacing: -.075em;
      font-weight: 900;
    }

    .accent {
      color: transparent;
      background: linear-gradient(90deg, var(--green), var(--lime) 54%, var(--yellow));
      background-clip: text;
      -webkit-background-clip: text;
    }

    .single-line {
      max-width: 740px;
      margin: 30px 0 0;
      font-size: clamp(20px, 3vw, 34px);
      line-height: 1.12;
      letter-spacing: -.035em;
      color: rgba(245, 247, 248, .92);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      margin-top: 38px;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 58px;
      padding: 0 26px 0 30px;
      border-radius: 999px;
      color: #071014;
      background: linear-gradient(135deg, var(--green), var(--lime));
      box-shadow: 0 20px 44px rgba(33, 232, 138, .30);
      font-weight: 800;
      letter-spacing: -.02em;
      transition: transform .2s ease, box-shadow .2s ease, filter .2s ease;
    }

    .cta:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
      box-shadow: 0 26px 54px rgba(33, 232, 138, .36);
    }

    .cta svg {
      width: 20px;
      height: 20px;
      transition: transform .2s ease;
    }

    .cta:hover svg {
      transform: translateX(4px);
    }

    .visual {
      position: relative;
      min-height: 620px;
      display: grid;
      place-items: center;
      z-index: 1;
    }

    .orb {
      position: absolute;
      width: 460px;
      height: 460px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 28%, rgba(255, 255, 255, .30), transparent 12%),
        conic-gradient(from 210deg, var(--green), var(--cyan), var(--violet), var(--yellow), var(--green));
      filter: saturate(1.1);
      opacity: .9;
      animation: float 7s ease-in-out infinite;
    }

    .orb::before {
      content: "";
      position: absolute;
      inset: 42px;
      border-radius: inherit;
      background: #0b1217;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .08);
    }

    .orb::after {
      content: "";
      position: absolute;
      inset: -26px;
      border-radius: inherit;
      background: inherit;
      filter: blur(38px);
      opacity: .18;
      z-index: -1;
    }

    .card {
      position: absolute;
      width: min(310px, 44vw);
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, .12);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, .13), rgba(255, 255, 255, .04)),
        rgba(14, 22, 27, .82);
      box-shadow: 0 26px 60px rgba(0, 0, 0, .34);
      backdrop-filter: blur(16px);
      overflow: hidden;
    }

    .card svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .card-code {
      top: 42px;
      right: 22px;
      transform: rotate(5deg);
      animation: cardFloatA 6s ease-in-out infinite;
    }

    .card-campus {
      left: -12px;
      top: 220px;
      transform: rotate(-7deg);
      animation: cardFloatB 7.4s ease-in-out infinite;
    }

    .card-network {
      right: 0;
      bottom: 62px;
      transform: rotate(8deg);
      animation: cardFloatC 6.7s ease-in-out infinite;
    }

    .pixel-ribbon {
      position: absolute;
      right: 40px;
      top: 118px;
      display: grid;
      grid-template-columns: repeat(4, 14px);
      gap: 8px;
      transform: rotate(14deg);
      opacity: .95;
    }

    .pixel-ribbon i {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      background: var(--green);
      box-shadow: 0 0 22px rgba(33, 232, 138, .35);
    }

    .pixel-ribbon i:nth-child(3n) {
      background: var(--violet);
      box-shadow: 0 0 22px rgba(123, 77, 255, .35);
    }

    .pixel-ribbon i:nth-child(4n) {
      background: var(--yellow);
      box-shadow: 0 0 22px rgba(255, 211, 61, .35);
    }

    .corner-code {
      position: absolute;
      left: 28px;
      bottom: 24px;
      display: flex;
      gap: 10px;
      color: rgba(245, 247, 248, .36);
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      font-size: 13px;
    }

    .corner-code b {
      color: var(--green);
      font-weight: 500;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-16px) rotate(8deg); }
    }

    @keyframes cardFloatA {
      0%, 100% { translate: 0 0; }
      50% { translate: 0 -14px; }
    }

    @keyframes cardFloatB {
      0%, 100% { translate: 0 0; }
      50% { translate: 12px 10px; }
    }

    @keyframes cardFloatC {
      0%, 100% { translate: 0 0; }
      50% { translate: -10px -12px; }
    }

    @media (max-width: 900px) {
      .shell {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .visual {
        min-height: 520px;
      }

      .brand-mark {
        position: relative;
        top: auto;
        left: auto;
        margin-bottom: 8px;
      }

      .content {
        padding-top: 0;
      }
    }

    @media (max-width: 560px) {
      .page {
        padding: 14px;
      }

      .shell {
        padding: 24px;
        border-radius: 28px;
      }

      .shell::before {
        inset: 10px;
        border-radius: 20px;
      }

      .brand-logo {
        width: 96px;
      }

      .single-line {
        margin-top: 22px;
      }

      .visual {
        min-height: 420px;
      }

      .orb {
        width: 330px;
        height: 330px;
      }

      .card {
        width: 238px;
        border-radius: 22px;
      }

      .card-code {
        top: 18px;
        right: -16px;
      }

      .card-campus {
        left: -16px;
        top: 168px;
      }

      .card-network {
        right: -18px;
        bottom: 32px;
      }

      .corner-code {
        display: none;
      }
    }
  </style>
</head>
